name: base_app
description: CareConnect HR mobile app built with Flutter, Provider, and Dio.
publish_to: 'none'

version: 1.0.0+1

#environment:
#  sdk: '>=3.3.0 <4.0.0'
#  flutter: '>=3.19.0'

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.5+1 # Manages app state efficiently
  # Log
  pretty_dio_logger: ^1.4.0 # Logs Dio network requests


  # Dependency Injection (DI)

  get_it: ^9.2.0 # Dependency injection and service locator
  equatable: ^2.0.8 # Equality comparison

  # Network
  dio: ^5.9.1 # Powerful HTTP client for API requests

  # Local Storage
  flutter_secure_storage: ^10.0.0 # Encrypted local storage
  shared_preferences: ^2.5.4 # Persistent storage
  #  envied: ^1.1.1 # Environment variable management
  flutter_dotenv: ^6.0.0 # Load environment variables from .env files


  # File Handling
  file_picker: ^10.3.10 # File selection and uploads
  image_picker: ^1.2.1 # Picks images from gallery/camera
  photo_view: ^0.15.0 # Zoomable image viewer

  # Loading and Animations
  flutter_spinkit: ^5.2.0 # Loading animations
  flutter_staggered_animations: ^1.1.1 # Staggered animations
  flutter_local_notifications: ^21.0.0 # Local notifications
  permission_handler: ^12.0.1 # Manage device permissions



  # Localization
  easy_localization: ^3.0.8 # Multi-language support

  # Image and Media
  cached_network_image: ^3.4.1 # Caches images for performance
  flutter_svg: ^2.2.3 # Renders SVG images

  # Authentication
  google_sign_in: ^7.2.0 # Enables Google authentication




  # UI Components
  otp_autofill: ^4.1.0
  auto_size_text: ^3.0.0 # Text auto-sizing
  shimmer: ^3.0.0 # Shimmer loading effect
  url_launcher: ^6.3.2 # Open URLs and deep links
  webview_flutter: ^4.9.0 # WebView for payment processing
  carousel_slider: ^5.1.2 # Image sliders
  dotted_border: ^3.1.0 # Dotted border widget
  syncfusion_flutter_datepicker: ^32.1.21 # Date picker
  device_preview: ^1.3.1 # View devices for test
  flutter_html: ^3.0.0-beta.2 # HTML rendering
  package_info_plus: ^9.0.0 # get app info
  pin_code_fields: ^8.0.1 # PIN code input fields
  flutter_timer_countdown: ^1.0.7 # Countdown timer UI
  flutter_rating_bar: ^4.0.1 # Rating bar widget
  modal_bottom_sheet: ^3.0.0-pre # Customizable bottom sheets
  cupertino_icons: ^1.0.8 # iOS-style icons
  #  video_player: ^2.9.2 # Video playback
  local_auth: ^3.0.0 # fingerprint or facial recognition


  animate_do: ^4.2.0

  #  cached_video_player_plus: ^3.0.3
  rive: ^0.14.2 # for awesome dialog "animations"

  # Animation and Indicators
  lottie: ^3.3.2 # Lottie animations



  # Firebase
  firebase_auth: ^6.1.4 # Firebase authentication
  firebase_core: ^4.4.0 # Firebase core integration
  firebase_messaging: ^16.1.1 # Push notifications

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
